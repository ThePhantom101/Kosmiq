services:
  astro-engine:
    build:
      context: ./apps/astro-engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/astro-engine:/app
    environment:
      - ENV=development

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - astro-engine
